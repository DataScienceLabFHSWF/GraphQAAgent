# docker-compose.backend.yml
#
# Lightweight deployment: only the GraphQA API, connecting to EXISTING
# infrastructure (Neo4j, Qdrant, Fuseki, Ollama) on the host or another
# compose stack (e.g., KGPlatform or KnowledgeGraphBuilder).
#
# Usage:
#   docker compose -f docker-compose.backend.yml up -d --build
#
# Port map:
#   8002  — GraphQA FastAPI API
#   8501  — Streamlit demo UI (optional, --profile frontend)
#
# Infrastructure assumed running:
#   7687  — Neo4j Bolt
#   6333  — Qdrant
#   3030  — Fuseki / SPARQL
#  11434  — Ollama (or custom port via KGRAG_OLLAMA__BASE_URL)

services:
  # ── GraphQA API (connects to external infra) ──────────────
  graphqa-api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: graphqa-api
    restart: unless-stopped
    ports:
      - "${KGRAG_API_PORT:-8002}:8002"
    env_file:
      - .env
    environment:
      KGRAG_NEO4J__URI: ${KGRAG_NEO4J__URI:-bolt://host.docker.internal:7687}
      KGRAG_NEO4J__USER: ${KGRAG_NEO4J__USER:-neo4j}
      KGRAG_NEO4J__PASSWORD: ${KGRAG_NEO4J__PASSWORD:-changeme}
      KGRAG_NEO4J__DATABASE: ${KGRAG_NEO4J__DATABASE:-neo4j}
      KGRAG_QDRANT__URL: ${KGRAG_QDRANT__URL:-http://host.docker.internal:6333}
      KGRAG_QDRANT__COLLECTION_NAME: ${KGRAG_QDRANT__COLLECTION_NAME:-kgbuilder}
      KGRAG_FUSEKI__URL: ${KGRAG_FUSEKI__URL:-http://host.docker.internal:3030}
      KGRAG_FUSEKI__DATASET: ${KGRAG_FUSEKI__DATASET:-kgbuilder}
      KGRAG_OLLAMA__BASE_URL: ${KGRAG_OLLAMA__BASE_URL:-http://host.docker.internal:11434}
      KGRAG_OLLAMA__GENERATION_MODEL: ${KGRAG_OLLAMA__GENERATION_MODEL:-gemma4:e4b}
      KGRAG_OLLAMA__EMBEDDING_MODEL: ${KGRAG_OLLAMA__EMBEDDING_MODEL:-qwen3-embedding:latest}
      KGRAG_OLLAMA__TEMPERATURE: ${KGRAG_OLLAMA__TEMPERATURE:-0.3}
      KGRAG_OLLAMA__MAX_TOKENS: ${KGRAG_OLLAMA__MAX_TOKENS:-4096}
      KGRAG_CORS_ORIGINS: ${KGRAG_CORS_ORIGINS:-http://localhost:3000,http://localhost:5173,http://localhost:8501}
      KGRAG_LOG_LEVEL: ${KGRAG_LOG_LEVEL:-INFO}
    command: >
      uvicorn kgrag.api.server:app
      --host 0.0.0.0
      --port 8002
      --workers ${KGRAG_API_WORKERS:-1}
      --timeout-keep-alive 120
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8002/api/v1/health"]
      interval: 30s
      timeout: 10s
      start_period: 15s
      retries: 3
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - graphqa-sessions:/app/data/sessions

  # ── Streamlit Demo UI (optional) ──────────────────────────
  graphqa-frontend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: graphqa-frontend
    restart: unless-stopped
    profiles: ["frontend"]
    ports:
      - "${KGRAG_FRONTEND_PORT:-8501}:8501"
    environment:
      API_URL: http://graphqa-api:8002/api/v1
    command: >
      streamlit run src/kgrag/frontend/app.py
      --server.port 8501
      --server.headless true
      --server.address 0.0.0.0
    depends_on:
      graphqa-api:
        condition: service_healthy

volumes:
  graphqa-sessions:
